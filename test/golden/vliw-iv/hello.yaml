name: "assert hello(*()) == ('Hello\n\0World',)"
limit: 1000
memory_size: 0x1000
memory_mapped_io:
  0x80: []
  0x84: []
reports:
  - name: Check results
    slice: last
    view: |
      numio[0x80]: {io:0x80:dec}
      numio[0x84]: {io:0x84:dec}
      symio[0x80]: {io:0x80:sym}
      symio[0x84]: {io:0x84:sym}
  - name: vliw-load
    slice: last
    view: |
      vliw:load-percent:    {vliw:load-percent}
      vliw:avg-load:        {vliw:avg-load}
      vliw:bundles-by-load: {vliw:bundles-by-load}
    assert: |
      vliw:load-percent:    81%
      vliw:avg-load:        3.24
      vliw:bundles-by-load: 1:3 (9%), 3:16 (48%), 4:14 (42%)
  - name: isa-specific
    slice: last
    view: |
      {isa-specific}
    assert: |
      vliw:load-percent:     81%
      vliw:avg-load:         3.24
      vliw:bundles-by-load: 1:3 (9%), 3:16 (48%), 4:14 (42%)