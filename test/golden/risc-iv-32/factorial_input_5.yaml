limit: 200
memory_size: 0x90
memory_mapped_io:
  0x80: [5]
  0x84: []
reports:
  - name: step-by-step
    slice: all
    view: |
      {T0} {T1} {T2} {T3}
      {pc}:	{instruction}	{pc:label}
  - name: result
    slice: last
    view: |
      numio[0x80]: {io:0x80:dec}
      numio[0x84]: {io:0x84:dec}
    assert: |
      numio[0x80]: [] >>> []
      numio[0x84]: [] >>> [120]
  - name: stats
    slice: last
    view: |
      instructions: {sim:instruction-count}
      sections: {layout:sections}
      text: {layout:text-sections}
      data: {layout:data-sections}
      mem-instr: {mem:instr-range}
      mem-data: {mem:data-range}
      mem-io: {mem:io-range}
    assert: |
      instructions: 42
      sections: 128
      text: 120
      data: 8
      mem-instr: 8..55, 108..123
      mem-data: 0..7
      mem-io: 128..135
