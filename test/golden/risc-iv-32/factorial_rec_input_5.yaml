limit: 100
memory_size: 0x300
memory_mapped_io:
  0x80: [5]
  0x84: []
reports:
  - name: step-by-step
    slice: all
    view: |
      [{A0}, {T0}]       {pc}{pc:label}:	{instruction}
  - name: result
    slice: last
    view: |
      numio[0x80]: {io:0x80:dec}
      numio[0x84]: {io:0x84:dec}
    assert: |
      numio[0x80]: [] >>> []
      numio[0x84]: [] >>> [120]
  - name: stats
    slice: last
    view: |
      instructions: {sim:instruction-count}
      mem-instr: {mem:instr-range}
      mem-data: {mem:data-range}
      mem-io: {mem:io-range}
    assert: |
      instructions: 87
      mem-instr: 0..75, 140..191
      mem-data: 100..107, 566..597
      mem-io: 128..135
