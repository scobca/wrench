name: wrench CI

on:
  pull_request:
  push:

jobs:
  haskell-formatting:
    timeout-minutes: 5
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: haskell-actions/run-fourmolu@v12
        with:
          version: "0.17.0.0"

  html-formatting:
    timeout-minutes: 5
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run Biome format
        run: npx @biomejs/biome format static/

      - name: Run Biome lint
        run: npx @biomejs/biome lint static/

  markdown-formatting:
    timeout-minutes: 5
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v6

      - name: Run mdl for check markdown format
        uses: nosborn/github-action-markdown-cli@v3.3.0
        with:
          files: .
          config_file: .markdownlint.yaml

  wrench:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6

      - uses: actions/cache@v5
        name: Cache ~/.stack
        with:
          path: ${{ '~/.stack' }}
          key: ${{ runner.os }}-wrench-with-test-${{ hashFiles('.stack-deps.txt') }}

      - name: Install haskell-stack
        uses: haskell-actions/setup@v2
        with:
          enable-stack: true
          stack-version: "latest"
          stack-no-global: true

      - name: Test
        run: make test

      - name: Test examples
        run: make test-examples

      - name: Build
        run: make build

      - name: Build examples
        run: python script/build_examples.py --fail-fast

      - uses: gacts/install-hurl@v1

      - name: Test server
        run: |
          mkdir variants
          make test-serv

  haskell-lint:
    timeout-minutes: 5
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: "Run HLint"
        uses: haskell-actions/hlint-scan@v1.3.0
        with:
          fail-on: warning

  is-variants-and-tests-actual:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: python script/variants.py
      - run: git diff --exit-code

  build-binaries:
    needs:
      - wrench
      - haskell-lint
    if: github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/')
    strategy:
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Cache dependencies on *nix
        uses: actions/cache@v5
        if: startsWith(runner.os, 'Linux') || startsWith(runner.os, 'macOS')
        with:
          path: ${{ '~/.stack' }}
          key: ${{ runner.os }}-${{ runner.arch }}-stack-build-${{ hashFiles('.stack-deps.txt') }}

      - name: Cache dependencies on Windows
        if: startsWith(runner.os, 'Windows')
        uses: actions/cache@v5
        with:
          path: |
            ~\AppData\Roaming\stack
            ~\AppData\Local\Programs\stack
            C:\sr
          key: ${{ runner.os }}-${{ runner.arch }}-stack-${{ hashFiles('.stack-deps.txt') }}

      - name: Install haskell-stack
        uses: haskell-actions/setup@v2
        with:
          enable-stack: true
          stack-version: "latest"
          stack-no-global: true

      - name: Build binary
        run: |
          stack build --copy-bins --local-bin-path ./dist

      - name: Prepare release archive
        run: |
          tar -czvf wrench-${{ runner.os }}-${{ runner.arch }}.tar.gz -C ./dist .

      - name: Upload Binary as Artifact
        uses: actions/upload-artifact@v7
        with:
          name: wrench-${{ runner.os }}-${{ runner.arch }}
          path: wrench-${{ runner.os }}-${{ runner.arch }}.tar.gz

  build-bottles:
    needs:
      - wrench
      - haskell-lint
      - build-binaries
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Build bottle archives
        run: |
          VERSION=$(basename $GITHUB_REF)
          VERSION=${VERSION#v}
          python script/build_bottles.py $VERSION

  publish-release:
    needs:
      - build-bottles
      - build-binaries
      - haskell-formatting
      - html-formatting
      - markdown-formatting
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          path: release
          merge-multiple: true

      - run: find ./release/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref }}
          name: ${{ github.ref_name }}
          draft: true
          prerelease: false
          generate_release_notes: true
          files: |
            release/*
          token: ${{ secrets.RELEASE_GITHUB_TOKEN }}

  # use `make release-image` to trigger it
  deploy-release:
    needs: publish-release
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Trigger deployment
        run: |
          curl -X POST -H "Content-Type: application/json" --fail-with-body \
            -d '{"task": "wrench-serv", "secret": "${{ secrets.DEPLOY_EDGE_WEBHOOK }}", "async":true}' \
            https://updater.edu.swampbuds.me/update

  build-edge-image:
    needs:
      - wrench
      - is-variants-and-tests-actual
      - haskell-lint
    if: github.ref == 'refs/heads/master'
    timeout-minutes: 30
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          file: Dockerfile
          tags: ryukzak/wrench:edge
          platforms: linux/arm64
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache
          build-args: |
            VERSION_SUFFIX=EDGE

  deploy-edge:
    needs: build-edge-image
    runs-on: ubuntu-latest
    steps:
      - name: Trigger deployment
        run: |
          curl -X POST -H "Content-Type: application/json" --fail-with-body \
            -d '{"task": "wrench-serv-edge", "secret": "${{ secrets.DEPLOY_EDGE_WEBHOOK }}", "async":true}' \
            https://updater.edu.swampbuds.me/update
