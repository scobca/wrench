name: Homebrew CI

on:
  release:
    types:
      - published

jobs:
  publish-to-homebrew:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Get release info and assets
        id: release
        uses: actions/github-script@v7
        with:
          script: |
            const release = await github.rest.repos.getReleaseByTag({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag: context.ref.replace('refs/tags/', '')
            });
            
            const assets = release.data.assets.map(a => a.name);
            const version = release.data.tag_name.replace(/^v/, '');
            
            console.log('Assets:', assets);
            console.log('Version:', version);
            
            return {
              version: version,
              assets: assets
            };

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          pip install requests

      - name: Generate Homebrew formula
        run: |
          python script/generate_homebrew_formula.py \
            --repo ${{ github.repository }} \
            --version ${{ steps.release.outputs.version }} \
            --assets '${{ toJSON(steps.release.outputs.assets) }}' \
            --output wrench.rb
          
      - name: Show generated formula
        run: |
          echo "Generated formula:"
          cat wrench.rb

      - name: Checkout tap repository
        uses: actions/checkout@v6
        with:
          repository: ${{ secrets.HOMEBREW_TAP_REPOSITORY }}
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Update formula in tap
        run: |
          cd tap
          cp ../wrench.rb .
          
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add wrench.rb
          git commit -m "Update wrench to version ${{ steps.release.outputs.version }} with bottles"
          git push origin main
          
          echo "Updated tap repository"

  test_formula_linux:
    runs-on: ubuntu-latest
    needs: publish-to-homebrew
    steps:
      - name: Test formula installation (Linux)
        run: |
          echo "Testing installation on Linux..."
          if ! command -v brew &> /dev/null; then
            /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
            eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"
          fi
          brew tap ${{ secrets.HOMEBREW_TAP_REPOSITORY }} || true
          brew trust ${{ secrets.HOMEBREW_TAP_REPOSITORY }}
          brew install wrench || true
          wrench --version || true

  test_formula_macOS:
    runs-on: ubuntu-latest
    needs: publish-to-homebrew
    steps:
      - name: Test formula installation (macOS)
        run: |
          brew tap ${{ secrets.HOMEBREW_TAP_REPOSITORY }} || true
          brew trust ${{ secrets.HOMEBREW_TAP_REPOSITORY }} || true
          brew install wrench || true
          wrench --version || true